<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Viking Village Fleet Map — Barnegat Light, NJ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Fullscreen app shell ── -->
  <div class="app">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-brand">
        <span class="topbar-title">Viking Village</span>
        <span class="topbar-sub">Barnegat Light, NJ</span>
      </div>
      <div class="topbar-stats" id="topbarStats">
        <div class="ts"><span class="ts-n fleet-stat-0">22</span><span class="ts-l">vessels</span></div>
        <div class="ts"><span class="ts-n fleet-stat-1">17</span><span class="ts-l">fishing</span></div>
        <div class="ts"><span class="ts-n fleet-stat-2">1</span><span class="ts-l">transit</span></div>
        <div class="ts"><span class="ts-n fleet-stat-3">2</span><span class="ts-l">port</span></div>
        <div class="ts"><span class="ts-n fleet-stat-4">3</span><span class="ts-l">return</span></div>
      </div>
      <div class="topbar-legend">
        <span class="leg"><i class="leg-dot leg-vessel"></i>Vessel</span>
        <span class="leg"><i class="leg-dot leg-port"></i>Port</span>
        <span class="leg"><i class="leg-dot leg-fishing"></i>Fishing</span>
      </div>
    </header>

    <!-- Main content: roster + map -->
    <main class="main">

      <!-- Roster sidebar -->
      <aside class="roster" id="fleetRoster">
        <div class="roster-head">Fleet Roster</div>
        <div class="roster-scroll" id="rosterList"></div>
      </aside>

      <!-- Map viewport -->
      <div class="map" id="fleetMap">
        <canvas id="fleetCanvasDepth"></canvas>
        <canvas id="fleetCanvasCurrents"></canvas>
        <canvas id="fleetCanvasCoast"></canvas>
        <canvas id="fleetCanvasVessels"></canvas>
        <canvas id="fleetCanvasAtmo"></canvas>

        <div class="vessel-info" id="vesselInfo">
          <h4 id="viName"></h4>
          <p id="viDetail"></p>
          <span class="vi-status" id="viStatus"></span>
        </div>
      </div>

    </main>

  </div>

</body>
</html>
